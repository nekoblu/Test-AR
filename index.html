<div id="maniqui-container" style="background:#020617; padding:40px; border-radius:30px; text-align:center; max-width:400px; margin:auto;">
    <h3 class="ancient" style="color:white; margin-bottom:20px; font-family:'Cinzel', serif;">Cuerpo de Luz</h3>
    
    <div style="position:relative; width:220px; height:450px; margin:auto;">
        <svg viewBox="0 0 200 500" style="width:100%; height:100%;">
            <defs>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <path d="M100,40 C115,40 125,50 125,75 C125,110 115,125 100,125 C85,125 75,110 75,75 C75,50 85,40 100,40 M75,95 L40,180 L55,460 M125,95 L160,180 L145,460 M90,125 L85,480 M110,125 L115,480" 
                  fill="none" stroke="rgba(45, 212, 191, 0.15)" stroke-width="1.5" />

            <path id="m-pulmon" d="M100,140 L80,160 L70,220 L50,280" 
                  fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-linecap="round" />

            <path id="m-estomago" d="M115,80 L115,180 L125,300 L130,450" 
                  fill="none" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,5">
                  <animate attributeName="stroke-dashoffset" from="100" to="0" dur="5s" repeatCount="indefinite" />
            </path>

            <path id="m-higado" d="M100,480 L110,400 L95,320 L85,250 L100,180" 
                  fill="none" stroke="#2dd4bf" stroke-width="2.5" filter="url(#glow)" style="filter: drop-shadow(0 0 8px #2dd4bf);">
                  <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite" />
            </path>

            <circle cx="50" cy="280" r="3" fill="#fff" shadow="0 0 10px white" /> <circle cx="100" cy="180" r="4" fill="#fbbf24" style="filter: drop-shadow(0 0 5px #fbbf24);" /> </svg>
    </div>

    <div style="margin-top:20px; font-family:sans-serif; color:#94a3b8; font-size:11px; text-transform:uppercase; letter-spacing:2px;">
        Progreso de Cultivo: <span style="color:#2dd4bf">Canal de Hígado Despierto</span>
    </div>
</div>
