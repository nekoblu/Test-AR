<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test AR · Maidi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A12;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;color:white;overflow:hidden}
#topbar{padding:8px 12px;font-size:10px;color:rgba(255,255,255,0.4);background:rgba(10,20,40,0.95);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#controls{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap;align-items:center;flex-shrink:0;background:rgba(10,20,40,0.9);border-bottom:1px solid rgba(255,255,255,0.07)}
#controls button{padding:5px 11px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:white;font-size:11px;font-weight:600;cursor:pointer}
#controls button.active{border-color:var(--pc);background:var(--pc);color:#000}
#view{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#video{display:none}
#idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;z-index:10}
#idle h2{font-size:19px;font-weight:700;color:#C9A84C}
#idle p{font-size:12px;color:rgba(255,255,255,0.5);text-align:center;line-height:1.7;max-width:290px}
#startBtn{padding:14px 36px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#BF4342,#8B2020);color:white;font-size:14px;font-weight:700}
#loading{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:15;background:rgba(0,0,0,0.8)}
#loading .spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,0.2);border-top:3px solid #C9A84C;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#log{position:absolute;top:8px;left:8px;right:8px;background:rgba(0,0,0,0.75);padding:7px 10px;border-radius:8px;font-size:10px;color:#4CF;max-height:90px;overflow-y:auto;font-family:monospace;z-index:20;pointer-events:none}
#infopanel{position:absolute;bottom:0;left:0;right:0;background:rgba(10,20,40,0.92);padding:12px 16px;z-index:10;border-top:1px solid rgba(201,168,76,0.2);transform:translateY(100%);transition:transform .3s}
#infopanel.show{transform:translateY(0)}
#infopanel h3{font-size:15px;font-weight:700;color:#C9A84C;margin-bottom:4px}
#infopanel p{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.6}
</style>
</head>
<body>

<div id="topbar">
  <span>📍 AR Test · Maidi <span id="poseStatus" style="color:#888">· Cargando…</span></span>
</div>

<div id="controls">
  <span style="font-size:10px;color:rgba(255,255,255,0.4)">Punto:</span>
  <button onclick="setPunto('ST36')" id="btn-ST36" style="--pc:#C8A050" class="active">ST36</button>
  <button onclick="setPunto('LI4')"  id="btn-LI4"  style="--pc:#5A8A5A">LI4</button>
  <button onclick="setPunto('PC6')"  id="btn-PC6"  style="--pc:#6B7FA3">PC6</button>
  <button onclick="setPunto('SP6')"  id="btn-SP6"  style="--pc:#8A6BB5">SP6</button>
  <button onclick="setPunto('GV20')" id="btn-GV20" style="--pc:#BF4342">GV20</button>
  <button onclick="setPunto('BL40')" id="btn-BL40" style="--pc:#5A8AB0">BL40</button>
</div>

<div id="view">
  <div id="idle">
    <h2>📍 Test AR · Maidi</h2>
    <p>Detección corporal con <strong style="color:#C9A84C">MediaPipe Pose</strong>.<br>Cámara trasera · Procesamiento local.</p>
    <button id="startBtn" onclick="init()">Activar cámara →</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size:12px;color:rgba(255,255,255,0.6)" id="loadingMsg">Iniciando…</div>
    <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:4px">Primera carga: ~5 MB</div>
  </div>

  <video id="video" playsinline muted></video>
  <canvas id="camCanvas"></canvas>
  <canvas id="arCanvas"></canvas>

  <div id="infopanel">
    <h3 id="panelTitle"></h3>
    <p id="panelDesc"></p>
  </div>

  <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
const PUNTOS = {
  ST36:{nombre:'Zusanli',    zona:'pierna anterior', instruccion:'4 dedos bajo el borde inferior de la rótula, 1 dedo lateral a la cresta tibial', color:'#C8A050',
        calc:(lm)=>interpLat(lm[25],lm[27],0.20, 0.04)},
  LI4: {nombre:'Hegu',       zona:'dorso de la mano', instruccion:'Entre el 1º y 2º metacarpiano, punto más alto al juntar pulgar e índice', color:'#5A8A5A',
        calc:(lm)=>interpLat(lm[15],lm[13],-0.15, 0.06)},
  PC6: {nombre:'Neiguan',    zona:'antebrazo anterior', instruccion:'3 dedos sobre el pliegue de la muñeca, entre los dos tendones centrales', color:'#6B7FA3',
        calc:(lm)=>interp(lm[15],lm[13],0.25)},
  SP6: {nombre:'Sanyinjiao', zona:'pierna medial', instruccion:'4 dedos sobre el vértice del maléolo interno, borde posterior de la tibia', color:'#8A6BB5',
        calc:(lm)=>interpLat(lm[27],lm[25],0.22,-0.04)},
  GV20:{nombre:'Baihui',     zona:'vértex craneal', instruccion:'Cruce de la línea sagital media con la línea que une los ápices de ambas orejas', color:'#BF4342',
        calc:(lm)=>({x:lm[0].x, y:lm[0].y-0.12, visibility:lm[0].visibility})},
  BL40:{nombre:'Weizhong',   zona:'pliegue poplíteo', instruccion:'Centro del pliegue posterior de la rodilla, entre los dos tendones', color:'#5A8AB0',
        calc:(lm)=>interp(lm[25],lm[27],0.02)},
};

function interp(a,b,t){
  return {x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, visibility:Math.min(a.visibility||0,b.visibility||0)};
}
function interpLat(a,b,t,lat){
  const dx=b.x-a.x, dy=b.y-a.y, len=Math.sqrt(dx*dx+dy*dy)||0.001;
  return {x:a.x+dx*t+(-dy/len)*lat, y:a.y+dy*t+(dx/len)*lat, visibility:Math.min(a.visibility||0,b.visibility||0)};
}

let selPunto = 'ST36';
let pose = null;
let camUtil = null;
let poseReady = false;

const video   = document.getElementById('video');
const camCvs  = document.getElementById('camCanvas');
const arCvs   = document.getElementById('arCanvas');
const camCtx  = camCvs.getContext('2d');
const arCtx   = arCvs.getContext('2d');
const logEl   = document.getElementById('log');

function log(msg, color){
  const t = new Date().toLocaleTimeString('es',{hour12:false});
  logEl.innerHTML += `<div style="color:${color||'#4CF'}">[${t}] ${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setPunto(id){
  selPunto = id;
  document.querySelectorAll('#controls button[id^="btn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+id)?.classList.add('active');
  const p = PUNTOS[id];
  document.getElementById('panelTitle').textContent = id+' · '+p.nombre;
  document.getElementById('panelDesc').textContent = p.instruccion;
  const panel = document.getElementById('infopanel');
  panel.classList.add('show');
  setTimeout(()=>panel.classList.remove('show'), 3500);
}

async function init(){
  document.getElementById('idle').style.display = 'none';
  const loading = document.getElementById('loading');
  loading.style.display = 'flex';

  try {
    document.getElementById('loadingMsg').textContent = 'Abriendo cámara trasera…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:640}, height:{ideal:480} },
      audio:false
    });
    video.srcObject = stream;
    await video.play();
    const s = stream.getVideoTracks()[0].getSettings();
    log(`✅ Cámara: ${s.width}×${s.height} · ${s.facingMode||'?'}`);

    document.getElementById('loadingMsg').textContent = 'Cargando modelo de detección…';
    pose = new Pose({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
    });
    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    pose.onResults(onResults);
    await pose.send({image: video});

    poseReady = true;
    document.getElementById('poseStatus').textContent = '· MediaPipe ✅';
    document.getElementById('poseStatus').style.color = '#4F4';
    log('✅ Modelo listo', '#4F4');
    loading.style.display = 'none';

    camUtil = new Camera(video, {
      onFrame: async () => { if(poseReady) await pose.send({image:video}); },
      width: s.width || 640,
      height: s.height || 480
    });
    camUtil.start();
    log('▶ Detección activa', '#4F4');
    setPunto(selPunto);

  } catch(e){
    loading.style.display = 'none';
    document.getElementById('idle').style.display = 'flex';
    log(`❌ ${e.name}: ${e.message}`, '#F66');
  }
}

function onResults(results){
  const w = results.image.width  || video.videoWidth  || 640;
  const h = results.image.height || video.videoHeight || 480;
  camCvs.width = arCvs.width  = w;
  camCvs.height = arCvs.height = h;
  camCtx.drawImage(results.image, 0, 0, w, h);
  arCtx.clearRect(0, 0, w, h);

  if(!results.poseLandmarks){ drawGuide(w,h); return; }

  const lm = results.poseLandmarks;
  const p  = PUNTOS[selPunto];
  drawSkeleton(lm, w, h);

  try {
    const pt  = p.calc(lm);
    const vis = pt.visibility || 0;
    if(vis > 0.3){
      drawPoint(pt.x*w, pt.y*h, p.color, selPunto, vis);
    } else {
      drawGuide(w, h);
      arCtx.fillStyle='rgba(0,0,0,0.55)';
      const msg='⚠ Muestra la zona: '+p.zona;
      arCtx.font='11px system-ui'; arCtx.textAlign='center';
      const mw=arCtx.measureText(msg).width+18;
      arCtx.fillRect(w/2-mw/2, h-38, mw, 22);
      arCtx.fillStyle='#FA0'; arCtx.fillText(msg, w/2, h-23);
    }
  } catch(e){ drawGuide(w,h); }
}

function drawPoint(px, py, color, label, vis){
  const pulse = Math.sin(Date.now()/350)*4;
  arCtx.strokeStyle=color+'66'; arCtx.lineWidth=2; arCtx.setLineDash([5,4]);
  arCtx.beginPath(); arCtx.arc(px,py,28+pulse,0,Math.PI*2); arCtx.stroke();
  arCtx.setLineDash([]);
  arCtx.strokeStyle='rgba(255,255,255,0.85)'; arCtx.lineWidth=1.5;
  arCtx.beginPath(); arCtx.moveTo(px-14,py); arCtx.lineTo(px+14,py); arCtx.stroke();
  arCtx.beginPath(); arCtx.moveTo(px,py-14); arCtx.lineTo(px,py+14); arCtx.stroke();
  arCtx.fillStyle=color+'DD';
  arCtx.beginPath(); arCtx.arc(px,py,9+pulse,0,Math.PI*2); arCtx.fill();
  arCtx.strokeStyle='white'; arCtx.lineWidth=2;
  arCtx.beginPath(); arCtx.arc(px,py,9+pulse,0,Math.PI*2); arCtx.stroke();
  arCtx.font='bold 13px system-ui'; arCtx.textAlign='center';
  const lw=arCtx.measureText(label).width+18;
  arCtx.fillStyle='rgba(0,0,0,0.75)';
  arCtx.fillRect(px-lw/2, py-46, lw, 22);
  arCtx.fillStyle='white'; arCtx.fillText(label, px, py-30);
  arCtx.fillStyle='rgba(0,0,0,0.5)';
  arCtx.fillRect(px-25, py+18, 50, 5);
  arCtx.fillStyle=vis>0.7?'#4F4':vis>0.5?'#FA0':'#F44';
  arCtx.fillRect(px-25, py+18, 50*vis, 5);
}

const BONES=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],[27,31],[28,32]];
function drawSkeleton(lm,w,h){
  arCtx.strokeStyle='rgba(255,255,255,0.15)'; arCtx.lineWidth=1.5;
  BONES.forEach(([a,b])=>{
    if(!lm[a]||!lm[b]) return;
    if((lm[a].visibility||0)<0.3||(lm[b].visibility||0)<0.3) return;
    arCtx.beginPath();
    arCtx.moveTo(lm[a].x*w, lm[a].y*h);
    arCtx.lineTo(lm[b].x*w, lm[b].y*h);
    arCtx.stroke();
  });
}

function drawGuide(w,h){
  const p=PUNTOS[selPunto];
  const pulse=Math.sin(Date.now()/500)*3;
  arCtx.strokeStyle=p.color+'88'; arCtx.lineWidth=2; arCtx.setLineDash([6,4]);
  arCtx.beginPath(); arCtx.arc(w/2,h/2,40+pulse,0,Math.PI*2); arCtx.stroke();
  arCtx.setLineDash([]);
  arCtx.font='12px system-ui'; arCtx.textAlign='center';
  const msg='Apunta a tu '+p.zona;
  const mw=arCtx.measureText(msg).width+20;
  arCtx.fillStyle='rgba(0,0,0,0.6)';
  arCtx.fillRect(w/2-mw/2, h/2+52, mw, 22);
  arCtx.fillStyle='white'; arCtx.fillText(msg, w/2, h/2+67);
}

document.getElementById('panelTitle').textContent='';
</script>
</body>
</html>
